<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(0,0,0,0.3);
}

header img{
    height:45px;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    margin-top:5px;
}

button:hover{
    background:#16a34a;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.history-item{
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

img.preview{
    width:150px;
    border-radius:8px;
    margin-top:8px;
}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="Logo.png">
<h3>Smart Tree Plantation</h3>
</div>
<div>
Welcome, <span id="username"></span>
</div>
</header>

<div class="container">

<div class="card">
<h2>Plant a Tree 🌱</h2>

<input type="text" id="treeName" placeholder="Enter Tree Name">

<input type="file" id="treeImage" accept="image/*">

<button onclick="captureLocation()">Capture Live Location 📍</button>
<p id="locationStatus" style="color:lightgreen;"></p>

<button id="plantBtn">Plant Tree</button>

</div>

<div class="card">
<h2>Your Impact 🌿</h2>
<div class="stats">
<div>Total Trees 🌳<br><strong id="treeCount">0</strong></div>
<div>Green Points 💚<br><strong id="greenPoints">0</strong></div>
</div>
</div>

<div class="card">
<h2>Plantation History</h2>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("Please login first.");
    window.location="index.html";
}

document.getElementById("username").innerText = currentUser;

let usersData = JSON.parse(localStorage.getItem("usersData")) || {};

if(!usersData[currentUser]){
    usersData[currentUser] = { trees:0, points:0, history:[] };
}

let latitude = null;
let longitude = null;

function captureLocation(){

    if(!navigator.geolocation){
        alert("Geolocation not supported");
        return;
    }

    document.getElementById("locationStatus").innerText = "Capturing location...";

    navigator.geolocation.getCurrentPosition(
        function(position){
            latitude = position.coords.latitude;
            longitude = position.coords.longitude;

            document.getElementById("locationStatus").innerText =
                "Location Captured ✅ (" +
                latitude.toFixed(4) + ", " +
                longitude.toFixed(4) + ")";
        },
        function(){
            alert("Please allow location access!");
        }
    );
}

document.getElementById("plantBtn")
.addEventListener("click", function(){

    let name = document.getElementById("treeName").value.trim();
    let imageFile = document.getElementById("treeImage").files[0];

    if(!name || !imageFile || latitude===null){
        alert("Please fill all fields and capture location!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        usersData[currentUser].trees += 1;
        usersData[currentUser].points += 10;

        usersData[currentUser].history.push({
            name:name,
            image:e.target.result,
            lat:latitude,
            lon:longitude,
            points:10,
            date:new Date().toLocaleString()
        });

        localStorage.setItem("usersData", JSON.stringify(usersData));

        alert("Tree Planted Successfully 🌳");

        location.reload();
    };

    reader.readAsDataURL(imageFile);
});

function updateUI(){

    document.getElementById("treeCount").innerText =
        usersData[currentUser].trees;

    document.getElementById("greenPoints").innerText =
        usersData[currentUser].points;

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    usersData[currentUser].history.forEach(tree => {

        historyDiv.innerHTML += `
            <div class="history-item">
                <strong>${tree.name}</strong><br>
                Points: ${tree.points}<br>
                <a target="_blank"
                href="https://www.google.com/maps?q=${tree.lat},${tree.lon}">
                View Location 📍</a><br>
                <img src="${tree.image}" class="preview">
                <br><small>${tree.date}</small>
            </div>
        `;
    });
}

updateUI();

</script>

</body>
</html>
