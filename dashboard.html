<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}
.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
}
.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Plant a Tree 🌱</h2>

<input type="text" id="treeName" placeholder="Enter Tree Name">

<input type="file" id="treeImage" accept="image/*">

<button id="locationBtn">Capture Location 📍</button>
<p id="locationStatus"></p>

<button id="plantBtn">Plant Tree 🌳</button>

</div>

<div class="card">
<h3>Total Trees: <span id="treeCount">0</span></h3>
<h3>Green Points: <span id="greenPoints">0</span></h3>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("Login first!");
    window.location = "index.html";
    return;
}

let usersData = JSON.parse(localStorage.getItem("usersData")) || {};

if(!usersData[currentUser]){
    usersData[currentUser] = { trees:0, points:0, history:[] };
}

let latitude = null;
let longitude = null;

// Capture Location
document.getElementById("locationBtn").addEventListener("click", function(){

    if(!navigator.geolocation){
        alert("Geolocation not supported");
        return;
    }

    document.getElementById("locationStatus").innerText = "Getting location...";

    navigator.geolocation.getCurrentPosition(
        function(position){
            latitude = position.coords.latitude;
            longitude = position.coords.longitude;

            document.getElementById("locationStatus").innerText = 
            "Location Captured ✅";
        },
        function(){
            alert("Please allow location permission!");
        }
    );
});

// Plant Tree
document.getElementById("plantBtn").addEventListener("click", function(){

    let name = document.getElementById("treeName").value.trim();
    let fileInput = document.getElementById("treeImage");
    let imageFile = fileInput.files[0];

    if(name === ""){
        alert("Enter tree name");
        return;
    }

    if(!imageFile){
        alert("Upload plant image");
        return;
    }

    if(latitude === null){
        alert("Capture location first");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        usersData[currentUser].trees += 1;
        usersData[currentUser].points += 10;

        usersData[currentUser].history.push({
            name:name,
            image:e.target.result,
            lat:latitude,
            lon:longitude,
            points:10,
            date:new Date().toLocaleString()
        });

        localStorage.setItem("usersData", JSON.stringify(usersData));

        alert("Tree Planted Successfully 🌳");

        // Reset
        document.getElementById("treeName").value="";
        fileInput.value="";
        document.getElementById("locationStatus").innerText="";
        latitude=null;
        longitude=null;

        updateUI();
    };

    reader.readAsDataURL(imageFile);
});

// Update UI
function updateUI(){

    document.getElementById("treeCount").innerText =
        usersData[currentUser].trees;

    document.getElementById("greenPoints").innerText =
        usersData[currentUser].points;

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML="";

    usersData[currentUser].history.forEach(tree => {

        historyDiv.innerHTML += `
        <p>
        🌳 ${tree.name} - ${tree.points} Points<br>
        <a target="_blank"
        href="https://www.google.com/maps?q=${tree.lat},${tree.lon}">
        View Location</a>
        </p>
        `;
    });
}

updateUI();

});
</script>

</body>
</html>
