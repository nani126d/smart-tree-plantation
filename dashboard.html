<!DOCTYPE html>
<html>
<head>
    <title>Smart Tree Plantation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6ffe6;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: green;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: darkgreen;
        }

        #dashboard {
            display: none;
        }

        .points {
            font-size: 18px;
            font-weight: bold;
            color: darkgreen;
        }
    </style>
</head>

<body>

<div class="container" id="registration">
    <h2>User Registration</h2>

    <input type="text" id="name" placeholder="Enter your name" required>
    <input type="email" id="email" placeholder="Enter your email" required>
    <input type="password" id="password" placeholder="Enter your password" required>

    <button onclick="registerUser()">Register</button>
</div>


<div class="container" id="dashboard">
    <h2>Plantation Dashboard</h2>

    <p class="points">Total Points: <span id="points">0</span></p>

    <h3>Add Plantation</h3>

    <input type="text" id="treeName" placeholder="Tree Name" required>
    <input type="file" id="treeImage" accept="image/*" required>
    <textarea id="experience" placeholder="Share your plantation experience" rows="4"></textarea>

    <button onclick="addPlantation()">Submit Plantation</button>

    <h3>My Plantations</h3>
    <div id="plantationList"></div>
</div>


<script>
    let totalPoints = 0;

    function registerUser() {
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if(name === "" || email === "" || password === "") {
            alert("Please fill all details!");
            return;
        }

        alert("Registration Successful!");

        document.getElementById("registration").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    }

    function addPlantation() {
        let treeName = document.getElementById("treeName").value;
        let experience = document.getElementById("experience").value;

        if(treeName === "" || experience === "") {
            alert("Please fill all plantation details!");
            return;
        }

        totalPoints += 10;
        document.getElementById("points").innerText = totalPoints;

        let plantationDiv = document.createElement("div");
        plantationDiv.innerHTML = `
            <hr>
            <h4>Tree: ${treeName}</h4>
            <p><b>Experience:</b> ${experience}</p>
            <p><b>Points Earned:</b> 10</p>
        `;

        document.getElementById("plantationList").appendChild(plantationDiv);

        document.getElementById("treeName").value = "";
        document.getElementById("experience").value = "";

        alert("Plantation Added! You earned 10 points 🌱");
    }
</script>

</body>
</html>
