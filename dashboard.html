
<!DOCTYPE html>
<html>
<head>
<title>Smart Tree Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#0f2027;
  color:white;
}
.card{
  background:#203a43;
  padding:20px;
  margin:20px;
  border-radius:10px;
}
button{
  padding:10px 20px;
  margin:10px;
  background:green;
  color:white;
  border:none;
  border-radius:5px;
}
input{
  padding:10px;
  width:80%;
}
</style>
</head>

<body>

<h2>🌳 Smart Tree Plantation</h2>

<div class="card">
  <input type="text" id="treeName" placeholder="Enter Tree Name"><br>

  <button onclick="getLocation()">Get Live Location</button>
  <p id="locationText">Location not captured</p>

  <button onclick="plantTree()">Plant Tree</button>
</div>

<div class="card">
  <p>Total Trees: <span id="totalTrees">0</span></p>
  <p>Total Green Points: <span id="totalPoints">0</span></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentLat = null;
let currentLon = null;

function getLocation(){
  navigator.geolocation.getCurrentPosition(function(position){
    currentLat = position.coords.latitude;
    currentLon = position.coords.longitude;

    document.getElementById("locationText").innerHTML =
      "Latitude: " + currentLat + "<br>Longitude: " + currentLon;

  }, function(){
    alert("Location permission denied");
  });
}

function plantTree(){

  const treeName = document.getElementById("treeName").value;

  if(treeName === ""){
    alert("Enter tree name");
    return;
  }

  if(currentLat === null){
    alert("Click Get Live Location first");
    return;
  }

  db.collection("plants").add({
    tree: treeName,
    latitude: currentLat,
    longitude: currentLon,
    points: 10,
    date: new Date().toLocaleString()
  })
  .then(()=>{
    alert("Tree Planted Successfully 🌳");
    document.getElementById("treeName").value="";
    loadStats();
  })
  .catch(error=>{
    alert("Error: "+error.message);
  });

}

function loadStats(){
  db.collection("plants").get().then(snapshot=>{
    let totalTrees = snapshot.size;
    let totalPoints = totalTrees * 10;

    document.getElementById("totalTrees").innerText = totalTrees;
    document.getElementById("totalPoints").innerText = totalPoints;
  });
}

loadStats();

</script>

</body>
</html>
