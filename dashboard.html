<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Dashboard | Smart Tree Plantation</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg-dark: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    --bg-light: linear-gradient(135deg,#e0f7fa,#a5d6a7);
    --card-dark: rgba(255,255,255,0.08);
    --card-light: rgba(255,255,255,0.7);
    --text-dark: white;
    --text-light: black;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg-dark);
    color:var(--text-dark);
    transition:0.4s;
}

.light-mode{
    background:var(--bg-light);
    color:var(--text-light);
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    backdrop-filter:blur(10px);
}

header img{
    height:50px;
}

.container{
    width:95%;
    margin:30px auto;
}

.card{
    padding:25px;
    border-radius:20px;
    margin-bottom:25px;
    backdrop-filter:blur(20px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.4s;
}

.dark .card{ background:var(--card-dark); }
.light-mode .card{ background:var(--card-light); }

input{
    padding:12px;
    width:100%;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:25px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    margin:5px 0;
}

button:hover{
    background:#16a34a;
}

.stats{
    display:flex;
    justify-content:space-around;
    font-size:18px;
}

.history-item{
    background:rgba(0,0,0,0.1);
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
}

.profile{
    text-align:center;
}

.avatar{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:10px;
}

canvas{
    max-width:100%;
}
</style>
</head>

<body class="dark">

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="Logo.png">
<h3>Smart Tree Plantation</h3>
</div>

<div>
Welcome, <strong id="user"></strong>
<button onclick="toggleMode()">Toggle Mode</button>
</div>
</header>

<div class="container">

<div class="card profile">
<img id="avatar" class="avatar">
<br>
<input type="file" onchange="uploadAvatar(event)">
</div>

<div class="card">
<h2>Plant Tree 🌱</h2>
<input type="text" id="treeName" placeholder="Tree Name">
<input type="text" id="location" placeholder="Location">
<button onclick="addTree()">Plant</button>
</div>

<div class="card">
<h2>Your Impact</h2>
<div class="stats">
<div>Total Trees 🌳<br><strong id="count">0</strong></div>
<div>Green Points 💚<br><strong id="points">0</strong></div>
</div>
</div>

<div class="card">
<h2>Growth Chart 📊</h2>
<canvas id="growthChart"></canvas>
</div>

<div class="card">
<h2>Plantation History</h2>
<div id="historyList"></div>
</div>

<div class="card">
<button onclick="window.location='leaderboard.html'">Leaderboard</button>
<button onclick="window.location='certificate.html'">Certificate</button>
<button onclick="logout()">Logout</button>
</div>

</div>
<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("Login first!");
    window.location = "index.html";
}

document.getElementById("user").innerText = currentUser;

// Get stored data
let data = JSON.parse(localStorage.getItem("usersData"));

if(!data){
    data = {};
}

if(!data[currentUser]){
    data[currentUser] = {
        trees: 0,
        points: 0,
        history: []
    };
}

// Save initial structure
localStorage.setItem("usersData", JSON.stringify(data));

function updateDisplay(){

    document.getElementById("count").innerText = data[currentUser].trees;
    document.getElementById("points").innerText = data[currentUser].points;

    let historyDiv = document.getElementById("historyList");
    historyDiv.innerHTML = "";

    data[currentUser].history.forEach(record => {

        let div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <strong>${record.tree}</strong><br>
            Location: ${record.location}<br>
            <small>${record.date}</small>
        `;

        historyDiv.appendChild(div);
    });
}

function addTree(){

    let name = document.getElementById("treeName").value.trim();
    let location = document.getElementById("location").value.trim();

    if(name === "" || location === ""){
        alert("Please enter tree name and location!");
        return;
    }

    data[currentUser].trees += 1;
    data[currentUser].points += 10;

    data[currentUser].history.push({
        tree: name,
        location: location,
        date: new Date().toLocaleString()
    });

    localStorage.setItem("usersData", JSON.stringify(data));

    document.getElementById("treeName").value = "";
    document.getElementById("location").value = "";

    updateDisplay();
}

function logout(){
    localStorage.removeItem("currentUser");
    window.location = "index.html";
}

updateDisplay();

</script>

</body>
</html>
