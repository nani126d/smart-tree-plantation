<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALC | Smart Tree Plantation Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary-green: #2ecc71;
  --accent-gold: #f1c40f;
  --glass-bg: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.2);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
              url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2560');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  padding: 40px 20px;
  text-align: center;
  animation: fadeInDown 1s ease-out;
}

header h1 {
  font-weight: 700;
  font-size: 2.5rem;
  margin: 0;
  text-transform: uppercase;
  letter-spacing: 3px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
}

header p {
  font-weight: 300;
  color: var(--primary-green);
  letter-spacing: 2px;
}

.container {
  width: 95%;
  max-width: 1000px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  padding-bottom: 50px;
}

/* Glassmorphism Card */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  transition: all 0.4s ease;
}

.glass-card:hover {
  border-color: var(--primary-green);
  transform: translateY(-5px);
}

h3 {
  margin-top: 0;
  font-weight: 600;
  border-left: 4px solid var(--primary-green);
  padding-left: 15px;
  margin-bottom: 25px;
}

/* Input Styling */
.input-group {
  margin-bottom: 20px;
  text-align: left;
}

label {
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 5px;
  display: block;
  color: #ccc;
}

input {
  width: 100%;
  padding: 14px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: white;
  font-size: 1rem;
  outline: none;
  transition: 0.3s;
}

input:focus {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--primary-green);
}

/* Buttons */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

button {
  padding: 15px 25px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-primary { background: var(--primary-green); color: #fff; width: 100%; margin-top: 15px; }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); }
.btn-accent { background: var(--accent-gold); color: #000; }

button:hover { filter: brightness(1.2); transform: scale(1.02); }

/* Stats Section */
.stats-container {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.stat-box {
  text-align: center;
  padding: 20px;
  border-radius: 15px;
  background: rgba(0,0,0,0.2);
  margin-bottom: 15px;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--primary-green);
  display: block;
}

.stat-label { font-size: 0.9rem; text-transform: uppercase; color: #aaa; }

#locationText {
  font-size: 0.85rem;
  color: var(--accent-gold);
  margin-top: 10px;
  min-height: 30px;
}

/* Toast Animation */
#toast {
  visibility: hidden;
  min-width: 250px;
  background-color: var(--primary-green);
  color: #fff;
  text-align: center;
  border-radius: 12px;
  padding: 16px;
  position: fixed;
  z-index: 1;
  left: 50%;
  bottom: 30px;
  font-size: 16px;
  transform: translateX(-50%);
}

#toast.show {
  visibility: visible;
  animation: fadein 0.5s, fadeout 0.5s 2.5s;
}

@keyframes fadein { from {bottom: 0; opacity:0;} to {bottom:30px; opacity:1;} }
@keyframes fadeout { from {bottom:30px; opacity:1;} to {bottom:0; opacity:0;} }

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; }
  header h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<header>
  <h1>Andhra Loyola College</h1>
  <p><i class="fas fa-leaf"></i> SMART TREE PLANTATION PROJECT</p>
</header>

<div class="container">
  <div class="glass-card">
    <h3><i class="fas fa-seedling"></i> Register Your Impact</h3>
    
    <div class="input-group">
      <label>VOLUNTEER NAME</label>
      <input type="text" id="userName" placeholder="e.g. John Doe">
    </div>

    <div class="input-group">
      <label>TREE SPECIES</label>
      <input type="text" id="treeName" placeholder="e.g. Neem, Peepal, Banyan">
    </div>

    <button class="btn-secondary" style="width:100%;" onclick="getLocation()">
      <i class="fas fa-map-marker-alt"></i> Get Geo-Location
    </button>
    <p id="locationText"><i class="fas fa-satellite"></i> GPS coordinates required...</p>

    <button class="btn-primary" id="plantBtn" onclick="plantTree()" disabled>
      <i class="fas fa-hand-holding-heart"></i> SUBMIT PLANTATION
    </button>
  </div>

  <div class="stats-container">
    <div class="glass-card">
      <h3><i class="fas fa-chart-line"></i> Real-time Analytics</h3>
      <div class="stat-box">
        <span class="stat-number" id="totalTrees">0</span>
        <span class="stat-label">Trees Planted</span>
      </div>
      <div class="stat-box">
        <span class="stat-number" id="totalPoints">0</span>
        <span class="stat-label">Green Credits Earned</span>
      </div>

      <div class="btn-grid">
        <button class="btn-secondary" onclick="window.location.href='leaderboard.html'">
          <i class="fas fa-trophy"></i> Ranking
        </button>
        <button class="btn-accent" onclick="window.location.href='certificate.html'">
          <i class="fas fa-certificate"></i> Certificate
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast">Tree Planted Successfully! 🌳</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentLat = null;
let currentLon = null;
const plantBtn = document.getElementById("plantBtn");

function getLocation(){
  const locDisplay = document.getElementById("locationText");
  locDisplay.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Accessing GPS...';

  if(!navigator.geolocation){
    alert("Geolocation is not supported by your browser");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position){
    currentLat = position.coords.latitude.toFixed(6);
    currentLon = position.coords.longitude.toFixed(6);
    locDisplay.innerHTML = `<i class="fas fa-check-circle" style="color:#2ecc71"></i> Lat: ${currentLat} | Lon: ${currentLon}`;
    plantBtn.disabled = false;
  }, function(){
    alert("Location permission denied");
    locDisplay.innerHTML = "Location access denied.";
  });
}

function plantTree(){
  const userName = document.getElementById("userName").value.trim();
  const treeName = document.getElementById("treeName").value.trim();

  if(!userName || !treeName){
    alert("Please provide both your name and the tree type.");
    return;
  }

  if(!currentLat){
    alert("Please enable GPS location before planting.");
    return;
  }

  db.collection("plants").add({
    user: userName,
    tree: treeName,
    latitude: currentLat,
    longitude: currentLon,
    points: 10,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    showToast();
    document.getElementById("treeName").value="";
    loadStats();
  }).catch(error=>{
    console.error("Error: ", error);
  });
}

// Realtime stats
function loadStats(){
  db.collection("plants").onSnapshot(snapshot => {
    const totalTrees = snapshot.size;
    const totalPoints = totalTrees * 10;
    document.getElementById("totalTrees").innerText = totalTrees;
    document.getElementById("totalPoints").innerText = totalPoints;
  });
}

function showToast(){
  const toast = document.getElementById("toast");
  toast.className = "show";
  setTimeout(()=>{ toast.className = toast.className.replace("show",""); }, 3000);
}

loadStats();
</script>

</body>
</html>
