<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
width:90%;
max-width:800px;
margin:20px auto;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
margin:10px;
}

.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
}
.stat-box{
background:rgba(0,0,0,0.3);
padding:15px;
border-radius:10px;
width:40%;
}
</style>
</head>
<body>

<div class="container">

<h1>🌳 Smart Tree Plantation</h1>

<div class="stats">
<div class="stat-box">
<h3>Total Trees</h3>
<h2 id="totalTrees">0</h2>
</div>

<div class="stat-box">
<h3>Total Green Points</h3>
<h2 id="totalPoints">0</h2>
</div>
</div>

<div class="card">
<h2>Plant a Tree 🌱</h2>

<input type="text" id="treeName" placeholder="Enter Tree Name">

<br>
<button onclick="captureLocation()">Capture Location 📍</button>
<p id="locationText"></p>

<button onclick="plantTree()">Plant Tree 🌳</button>
</div>

</div>

<script>

let latitude = null;
let longitude = null;

// Load saved data
let plants = JSON.parse(localStorage.getItem("plants")) || [];

updateStats();

// Capture GPS
function captureLocation(){
navigator.geolocation.getCurrentPosition(
(position)=>{
latitude = position.coords.latitude;
longitude = position.coords.longitude;
document.getElementById("locationText").innerText =
"Location Captured ✅ ("+latitude.toFixed(4)+", "+longitude.toFixed(4)+")";
},
()=>{
alert("Location permission denied");
}
);
}

// Plant Tree
function plantTree(){

let name = document.getElementById("treeName").value;

if(name === "" || latitude === null){
alert("Please enter tree name and capture location!");
return;
}

let newPlant = {
name: name,
lat: latitude,
lon: longitude,
points: 10,
date: new Date().toLocaleString()
};

plants.push(newPlant);
localStorage.setItem("plants", JSON.stringify(plants));

alert("Tree Planted Successfully 🌳💚");

document.getElementById("treeName").value = "";
document.getElementById("locationText").innerText = "";
latitude = null;
longitude = null;

updateStats();
}

// Update stats
function updateStats(){
let totalTrees = plants.length;
let totalPoints = totalTrees * 10;

document.getElementById("totalTrees").innerText = totalTrees;
document.getElementById("totalPoints").innerText = totalPoints;
}

</script>

</body>
</html>
