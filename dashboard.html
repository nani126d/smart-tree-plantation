<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Smart Tree Plantation</title>

<style>

/* ===== Background ===== */
body{
  <header style="display:flex; align-items:center; justify-content:center; gap:20px; background:linear-gradient(90deg,#0f2027,#203a43,#2c5364); padding:20px; color:white;">

    <img src="Logo.png" alt="College Logo" 
         style="height:80px; width:auto; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.4);">

    <div>
        <h1 style="margin:0; font-size:28px;">Your College Name</h1>
        <h2 style="margin:0; font-weight:300;">Smart Tree Plantation</h2>
    </div>

</header>
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center center/cover;
  height:100vh;
  overflow-x:hidden;
}

/* Dark overlay */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:-1;
}

/* ===== Header ===== */
header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:15px;
  animation: slideDown 1s ease;
}

header img{
  height:50px;
}

header h2{
  margin:0;
}

@keyframes slideDown{
  from{transform:translateY(-100%);}
  to{transform:translateY(0);}
}

/* ===== Glass Card ===== */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  margin-top:40px;
}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:20px;
  width:350px;
  color:white;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

/* ===== Buttons ===== */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  background:#009624;
}

.stats{
  margin-top:15px;
  font-size:18px;
}

.nav-buttons{
  margin-top:15px;
}

.nav-buttons button{
  background:#0288d1;
}

.logout{
  background:#d32f2f !important;
}

</style>
</head>

<body>

<header>
  <img src="logo.png" alt="College Logo">
  <h2>ANDHRA LOYOLA COLLEGE – CSE Department</h2>
</header>

<div class="container">
  <div class="card">

    <h3>Welcome, <span id="user"></span> 🌳</h3>

    <input type="text" id="treeName" placeholder="Enter Tree Name">
    <input type="text" id="location" placeholder="Enter Location">

    <button onclick="addTree()">🌱 Plant Tree</button>

    <div class="stats">
      <p>Total Trees: <strong id="count">0</strong></p>
      <p>Green Points: <strong id="points">0</strong></p>
    </div>

    <div class="nav-buttons">
      <button onclick="goLeaderboard()">🏆 Leaderboard</button>
      <button onclick="goCertificate()">🎓 Certificate</button>
      <button class="logout" onclick="logout()">🚪 Logout</button>
    </div>

  </div>
</div>

<script>

/* ===== Authentication ===== */
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
  window.location="index.html";
}

document.getElementById("user").innerText = currentUser;

/* ===== Data System ===== */
let data = JSON.parse(localStorage.getItem("usersData")) || {};

if(!data[currentUser]){
  data[currentUser] = { trees:0, points:0 };
}

/* ===== Update Display ===== */
function updateDisplay(){
  document.getElementById("count").innerText = data[currentUser].trees;
  document.getElementById("points").innerText = data[currentUser].points;
}

/* ===== Add Tree ===== */
function addTree(){
  let name = document.getElementById("treeName").value;
  let location = document.getElementById("location").value;

  if(name==="" || location===""){
    alert("Please fill all details!");
    return;
  }

  data[currentUser].trees += 1;
  data[currentUser].points += 10;

  localStorage.setItem("usersData", JSON.stringify(data));

  document.getElementById("treeName").value="";
  document.getElementById("location").value="";

  updateDisplay();
}

/* ===== Navigation ===== */
function goLeaderboard(){
  window.location="leaderboard.html";
}

function goCertificate(){
  window.location="certificate.html";
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location="index.html";
}

updateDisplay();

</script>

</body>
</html>
