<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(0,0,0,0.3);
}

header img{
    height:45px;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.history-item{
    background:rgba(255,255,255,0.15);
    padding:8px;
    border-radius:8px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="Logo.png">
<h3>Smart Tree Plantation</h3>
</div>
<div>
Welcome, <span id="username"></span>
</div>
</header>

<div class="container">

<div class="card">
<h2>Plant New Tree 🌱</h2>
<input type="text" id="treeName" placeholder="Tree Name">
<input type="text" id="treeLocation" placeholder="Location">
<button id="plantBtn">Plant Tree</button>
</div>

<div class="card">
<h2>Your Impact 📊</h2>
<div class="stats">
<div>Total Trees 🌳<br><strong id="treeCount">0</strong></div>
<div>Green Points 💚<br><strong id="greenPoints">0</strong></div>
</div>
</div>

<div class="card">
<h2>Plantation History 🌿</h2>
<div id="history"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.plantTree = async function() {

  const treeName = document.getElementById("treeName").value;

  if(treeName === ""){
    alert("Enter tree name");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (position)=>{

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    await addDoc(collection(db,"plants"),{
      tree: treeName,
      lat: lat,
      lon: lon,
      points: 10,
      date: new Date().toLocaleString()
    });

    alert("Tree Planted Successfully 🌳");

    document.getElementById("treeName").value="";

  }, ()=>{
    alert("Location permission denied");
  });

}

</script>

</body>
</html>
