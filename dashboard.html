<!DOCTYPE html>
<html>
<head>
  <title>Smart Tree Plantation - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,255,0,0.4);
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: none;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00e676;
      transform: scale(1.05);
    }

    .stats {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🌳 Smart Tree Plantation</h1>

<div class="card">
  <h3>Plant a Tree</h3>
  <input type="text" id="treeName" placeholder="Enter Tree Name">
  <br>
  <button onclick="plantTree()">Plant Tree</button>
</div>

<div class="card stats">
  <p>Total Trees Planted: <span id="totalTrees">0</span></p>
  <p>Total Green Points: <span id="totalPoints">0</span></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

// 🔥 Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa",
  measurementId: "G-LWRSXNFQ0K"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌳 Plant Tree Function
function plantTree() {

  const treeName = document.getElementById("treeName").value;

  if(treeName === ""){
    alert("Enter tree name");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position){

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    db.collection("plants").add({
      tree: treeName,
      latitude: lat,
      longitude: lon,
      points: 10,
      date: new Date().toLocaleString()
    })
    .then(()=>{
      alert("Tree Planted Successfully 🌳");
      document.getElementById("treeName").value="";
      loadStats();
    })
    .catch((error)=>{
      alert("Error: " + error.message);
    });

  }, function(){
    alert("Location permission denied");
  });
}

// 📊 Load Total Trees & Points
function loadStats(){
  db.collection("plants").get().then((snapshot)=>{
    let totalTrees = snapshot.size;
    let totalPoints = totalTrees * 10;

    document.getElementById("totalTrees").innerText = totalTrees;
    document.getElementById("totalPoints").innerText = totalPoints;
  });
}

// Load stats on page load
loadStats();

</script>

</body>
</html>
