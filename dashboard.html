<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Smart Tree Plantation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg,#d4fc79,#96e6a1,#38ef7d,#11998e);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  text-align:center;
}

@keyframes gradientBG {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  background:#0b6623;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
  animation: slideDown 1s ease;
}

@keyframes slideDown{
  from{transform:translateY(-100%);}
  to{transform:translateY(0);}
}

header img{
  height:50px;
}

header div{
  text-align:left;
}

header h2{
  margin:0;
  font-size:18px;
}

header p{
  margin:0;
  font-size:14px;
}

.card{
  background:white;
  width:350px;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

input{
  width:90%;
  padding:8px;
  margin:8px 0;
}

button{
  padding:8px 15px;
  background:#0b6623;
  color:white;
  border:none;
  cursor:pointer;
  margin:5px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#145a32;
}
</style>
</head>
<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" alt="College Logo">
  <div>
    <h2>ANDHRA LOYOLA COLLEGE</h2>
    <p>CSE Department – Green Technology Project</p>
  </div>
</header>

<div class="card">
  <h3>Plant a Tree</h3>
  <input type="text" id="treeName" placeholder="Tree Name">
  <input type="text" id="location" placeholder="Location">
  <button onclick="addTree()">Plant</button>

  <h4>Total Trees: <span id="count">0</span></h4>
  <h4>Green Points: <span id="points">0</span></h4>
</div>

<div class="card">
  <button onclick="goLeaderboard()">Leaderboard</button>
  <button onclick="goCertificate()">Download Certificate</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
  window.location="index.html";
}

document.getElementById("user").innerText = currentUser;

let data = JSON.parse(localStorage.getItem("usersData")) || {};

if(!data[currentUser]){
  data[currentUser] = {
    trees: 0,
    points: 0
  };
  localStorage.setItem("usersData", JSON.stringify(data));
}

function updateDisplay(){
  document.getElementById("count").innerText = data[currentUser].trees;
  document.getElementById("points").innerText = data[currentUser].points;
}

function addTree(){
  let name = document.getElementById("treeName").value;
  let location = document.getElementById("location").value;

  if(name === "" || location === ""){
    alert("Please fill all details!");
    return;
  }

  data[currentUser].trees += 1;
  data[currentUser].points += 10;

  localStorage.setItem("usersData", JSON.stringify(data));

  document.getElementById("treeName").value = "";
  document.getElementById("location").value = "";

  updateDisplay();
}

function goLeaderboard(){
  window.location="leaderboard.html";
}

function goCertificate(){
  window.location="certificate.html";
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location="index.html";
}

updateDisplay();
</script>

</body>
</html>
