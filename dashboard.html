<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Tree Plantation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg,#d4fc79,#96e6a1);
            text-align: center;
        }

        h1 {
            padding-top: 30px;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            margin: 20px auto;
            width: 300px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .number {
            font-size: 40px;
            font-weight: bold;
            color: #27ae60;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #27ae60;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #219150;
            transform: scale(1.1);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🌱 Plantation Dashboard</h1>

<div class="container">

    <div class="card">
        <div class="number" id="treeCount">0</div>
        <p>Your Trees Planted</p>
    </div>

    <div class="card">
        <div class="number" id="greenPoints">0</div>
        <p>Your Green Points</p>
    </div>

    <button onclick="plantTree()">Plant a Tree</button>

    <br>
    <a href="leaderboard.html">View Leaderboard</a>

</div>

<script>

    let trees = localStorage.getItem("trees");
    let points = localStorage.getItem("points");

    if (trees === null) trees = 0;
    if (points === null) points = 0;

    trees = parseInt(trees);
    points = parseInt(points);

    document.getElementById("treeCount").innerText = trees;
    document.getElementById("greenPoints").innerText = points;

    function plantTree() {
        trees += 1;
        points += 10;

        localStorage.setItem("trees", trees);
        localStorage.setItem("points", points);

        animateValue("treeCount", trees);
        animateValue("greenPoints", points);
    }

    function animateValue(id, end) {
        let start = end - 1;
        let duration = 300;
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));
        let obj = document.getElementById(id);

        let timer = setInterval(function() {
            current += increment;
            obj.innerText = current;
            if (current == end) {
                clearInterval(timer);
            }
        }, stepTime);
    }

</script>

</body>
</html>
