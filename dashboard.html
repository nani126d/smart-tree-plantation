<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(0,0,0,0.3);
}

header img{
    height:45px;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.stats{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
}

.history-item{
    background:rgba(255,255,255,0.15);
    padding:8px;
    border-radius:8px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<header>
<div style="display:flex;align-items:center;gap:10px;">
<img src="Logo.png">
<h3>Smart Tree Plantation</h3>
</div>
<div>
Welcome, <span id="username"></span>
</div>
</header>

<div class="container">

<div class="card">
<h2>Plant New Tree 🌱</h2>
<input type="text" id="treeName" placeholder="Tree Name">
<input type="text" id="treeLocation" placeholder="Location">
<button id="plantBtn">Plant Tree</button>
</div>

<div class="card">
<h2>Your Impact 📊</h2>
<div class="stats">
<div>Total Trees 🌳<br><strong id="treeCount">0</strong></div>
<div>Green Points 💚<br><strong id="greenPoints">0</strong></div>
</div>
</div>

<div class="card">
<h2>Plantation History 🌿</h2>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("Please login first.");
    window.location="index.html";
}

document.getElementById("username").innerText = currentUser;

let usersData = JSON.parse(localStorage.getItem("usersData"));

if(!usersData){
    usersData = {};
}

if(!usersData[currentUser]){
    usersData[currentUser] = {
        trees:0,
        points:0,
        history:[]
    };
}

localStorage.setItem("usersData", JSON.stringify(usersData));

function updateUI(){

    document.getElementById("treeCount").innerText =
        usersData[currentUser].trees;

    document.getElementById("greenPoints").innerText =
        usersData[currentUser].points;

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML = "";

    usersData[currentUser].history.forEach(item => {

        let div = document.createElement("div");
        div.className="history-item";
        div.innerHTML =
            "<strong>"+item.name+"</strong><br>" +
            "Location: "+item.location+"<br>" +
            "<small>"+item.date+"</small>";

        historyDiv.appendChild(div);
    });
}

function plantTree(){

    let name = document.getElementById("treeName").value.trim();
    let location = document.getElementById("treeLocation").value.trim();

    if(name==="" || location===""){
        alert("Please enter tree name and location");
        return;
    }

    usersData[currentUser].trees += 1;
    usersData[currentUser].points += 10;

    usersData[currentUser].history.push({
        name:name,
        location:location,
        date:new Date().toLocaleString()
    });

    localStorage.setItem("usersData", JSON.stringify(usersData));

    document.getElementById("treeName").value="";
    document.getElementById("treeLocation").value="";

    updateUI();
}

document.getElementById("plantBtn")
.addEventListener("click", plantTree);

updateUI();

</script>

</body>
</html>
