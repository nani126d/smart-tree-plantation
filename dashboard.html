<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation - Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(0,0,0,0.3);
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.history-item{
    background:rgba(255,255,255,0.15);
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.preview{
    width:120px;
    border-radius:8px;
    margin-top:8px;
}
</style>
</head>

<body>

<header>
<h3>🌱 Smart Tree Plantation</h3>
<div>Welcome, <span id="username"></span></div>
</header>

<div class="container">

<div class="card">
<h2>Plant a Tree</h2>

<input type="text" id="treeName" placeholder="Enter Tree Name">

<input type="file" id="treeImage" accept="image/*">

<button type="button" onclick="captureLocation()">Capture Location 📍</button>
<p id="locationStatus"></p>

<button type="button" onclick="plantTree()">Plant Tree 🌳</button>

</div>

<div class="card">
<h2>Your Impact</h2>
<p>Total Trees: <strong id="treeCount">0</strong></p>
<p>Green Points: <strong id="greenPoints">0</strong></p>
</div>

<div class="card">
<h2>Plantation History</h2>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    alert("Please login first!");
    window.location = "index.html";
}

document.getElementById("username").innerText = currentUser;

let usersData = JSON.parse(localStorage.getItem("usersData")) || {};

if(!usersData[currentUser]){
    usersData[currentUser] = { trees:0, points:0, history:[] };
}

let latitude = null;
let longitude = null;

// Capture Location
function captureLocation(){

    if(!navigator.geolocation){
        alert("Geolocation not supported");
        return;
    }

    document.getElementById("locationStatus").innerText = "Getting location...";

    navigator.geolocation.getCurrentPosition(
        function(position){
            latitude = position.coords.latitude;
            longitude = position.coords.longitude;

            document.getElementById("locationStatus").innerText =
            "Location Captured ✅";
        },
        function(error){
            alert("Allow location permission!");
        }
    );
}

// Plant Tree Function
function plantTree(){

    let name = document.getElementById("treeName").value.trim();
    let imageInput = document.getElementById("treeImage");
    let imageFile = imageInput.files[0];

    if(name === ""){
        alert("Enter tree name!");
        return;
    }

    if(!imageFile){
        alert("Upload plant image!");
        return;
    }

    if(latitude === null || longitude === null){
        alert("Please capture location first!");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(event){

        let imageData = event.target.result;

        usersData[currentUser].trees += 1;
        usersData[currentUser].points += 10;

        usersData[currentUser].history.push({
            name:name,
            image:imageData,
            lat:latitude,
            lon:longitude,
            points:10,
            date:new Date().toLocaleString()
        });

        localStorage.setItem("usersData", JSON.stringify(usersData));

        alert("Tree Planted Successfully 🌳");

        // Reset form
        document.getElementById("treeName").value="";
        imageInput.value="";
        document.getElementById("locationStatus").innerText="";
        latitude=null;
        longitude=null;

        updateUI();
    };

    reader.readAsDataURL(imageFile);
}

// Update UI
function updateUI(){

    document.getElementById("treeCount").innerText =
        usersData[currentUser].trees;

    document.getElementById("greenPoints").innerText =
        usersData[currentUser].points;

    let historyDiv = document.getElementById("history");
    historyDiv.innerHTML="";

    usersData[currentUser].history.forEach(tree => {

        historyDiv.innerHTML += `
        <div class="history-item">
            <strong>${tree.name}</strong><br>
            Points: ${tree.points}<br>
            <a target="_blank"
            href="https://www.google.com/maps?q=${tree.lat},${tree.lon}">
            View Location 📍</a><br>
            <img src="${tree.image}" class="preview"><br>
            <small>${tree.date}</small>
        </div>
        `;
    });
}

updateUI();

</script>

</body>
</html>
