<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Smart Tree Plantation</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#56ab2f,#a8e063);
    text-align:center;
}

/* Header */
header{
    background:#1b5e20;
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    animation: slideDown 0.8s ease;
}

header img{
    height:50px;
}

@keyframes slideDown{
    from{transform:translateY(-100%);}
    to{transform:translateY(0);}
}

/* Card */
.card{
    background:white;
    width:350px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    padding:10px 20px;
    margin:8px 0;
    border:none;
    border-radius:25px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#1b5e20;
}

.stats{
    margin-top:15px;
    font-size:18px;
}

.nav{
    margin-top:15px;
}
</style>
</head>

<body>

<header>
    <img src="Logo.png">
    <h2>Your College Name – CSE Department</h2>
</header>

<div class="card">

<h3>Welcome, <span id="user"></span> 🌱</h3>

<input type="text" id="treeName" placeholder="Tree Name">
<input type="text" id="location" placeholder="Location">

<button onclick="addTree()">Plant Tree</button>

<div class="stats">
    <p>Total Trees: <strong id="count">0</strong></p>
    <p>Green Points: <strong id="points">0</strong></p>
</div>

<div class="nav">
    <button onclick="goLeaderboard()">Leaderboard</button>
    <button onclick="goCertificate()">Certificate</button>
    <button onclick="logout()">Logout</button>
</div>

</div>

<script>

// Get logged in user
let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    window.location="index.html";
}

document.getElementById("user").innerText = currentUser;

// Get all users data
let data = JSON.parse(localStorage.getItem("usersData")) || {};

// Create user if not exists
if(!data[currentUser]){
    data[currentUser] = { trees:0, points:0 };
}

// Update numbers
function updateDisplay(){
    document.getElementById("count").innerText = data[currentUser].trees;
    document.getElementById("points").innerText = data[currentUser].points;
}

// Add tree
function addTree(){
    let name = document.getElementById("treeName").value;
    let location = document.getElementById("location").value;

    if(name==="" || location===""){
        alert("Please fill all details!");
        return;
    }

    data[currentUser].trees += 1;
    data[currentUser].points += 10;

    localStorage.setItem("usersData", JSON.stringify(data));

    document.getElementById("treeName").value="";
    document.getElementById("location").value="";

    updateDisplay();
}

function goLeaderboard(){
    window.location="leaderboard.html";
}

function goCertificate(){
    window.location="certificate.html";
}

function logout(){
    localStorage.removeItem("currentUser");
    window.location="index.html";
}

updateDisplay();

</script>

</body>
</html>
