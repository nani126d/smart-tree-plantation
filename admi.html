<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Smart Tree Plantation</title>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    background:rgba(0,0,0,0.3);
}

.stats{
    text-align:center;
    padding:15px;
}

#map{
    height:500px;
    margin:20px;
    border-radius:12px;
    border:3px solid white;
}

.point-label{
    background:#22c55e;
    color:white;
    padding:4px 8px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
    border:none;
}

</style>
</head>

<body>

<header>
🌍 Admin Control Panel - Live Plantation Map
</header>

<div class="stats">
Total Users: <strong id="totalUsers">0</strong> |
Total Trees Planted: <strong id="totalTrees">0</strong>
</div>

<div id="map"></div>

<script>

// Initialize map (center of India)
var map = L.map('map').setView([20.5937, 78.9629], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

let usersData = JSON.parse(localStorage.getItem("usersData")) || {};

let totalUsers = 0;
let totalTrees = 0;

for(let user in usersData){

    totalUsers++;

    usersData[user].history.forEach(tree => {

        totalTrees++;

        if(tree.lat && tree.lon){

            // Create custom green points badge
            let greenIcon = L.divIcon({
                className: 'custom-icon',
                html: `<div class="point-label">${tree.points} 💚</div>`
            });

            let marker = L.marker([tree.lat, tree.lon], {
                icon: greenIcon
            }).addTo(map);

            marker.bindPopup(`
                <div style="text-align:center; color:black;">
                    <strong>${tree.name}</strong><br>
                    User: ${user}<br>
                    Green Points: ${tree.points}<br>
                    Date: ${tree.date}<br><br>
                    <img src="${tree.image}" 
                         width="150" 
                         style="border-radius:8px;">
                </div>
            `);
        }

    });
}

document.getElementById("totalUsers").innerText = totalUsers;
document.getElementById("totalTrees").innerText = totalTrees;

</script>

</body>
</html>
