<!DOCTYPE html>
<html>
<head>
  <title>Smart Tree Plantation - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial; background: #0f2027; color: white; text-align:center; }
    h1 { margin:20px 0; }
    #map { height: 500px; width: 90%; margin: auto; border-radius: 10px; }
    .stats { margin:20px; font-size:18px; }
    button { padding:10px 20px; background: #00c853; color:white; border:none; border-radius:5px; cursor:pointer; margin-bottom:10px; }
    button:hover { background:#00e676; }
  </style>
</head>
<body>

<h1>🌳 Smart Tree Plantation - Admin</h1>

<div class="stats">
  <p>Total Trees: <span id="totalTrees">0</span></p>
  <p>Total Green Points: <span id="totalPoints">0</span></p>
</div>

<div id="map"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// 🔥 Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🌳 Initialize Map
const map = L.map('map').setView([20.5937, 78.9629], 5); // Center India
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Load Trees from Firebase
function loadTrees(){
  db.collection("plants").get().then(snapshot=>{
    let totalTrees = snapshot.size;
    let totalPoints = totalTrees * 10;

    document.getElementById("totalTrees").innerText = totalTrees;
    document.getElementById("totalPoints").innerText = totalPoints;

    snapshot.forEach(doc=>{
      const data = doc.data();
      const lat = data.latitude;
      const lon = data.longitude;
      const tree = data.tree;

      if(lat && lon){
        const marker = L.marker([lat, lon]).addTo(map);
        marker.bindPopup(`<b>Tree:</b> ${tree}<br><b>Points:</b> ${data.points}<br><b>Date:</b> ${data.date}`);
      }
    });
  });
}

loadTrees();

</script>

</body>
</html>
