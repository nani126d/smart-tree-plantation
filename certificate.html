<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Certificate</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
    margin:0;
    font-family:'Georgia',serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    text-align:center;
    padding:30px;
    color:white;
}

.certificate{
    background:white;
    color:black;
    padding:40px;
    border-radius:20px;
    width:700px;
    margin:auto;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

h1{
    color:#2e7d32;
    font-size:32px;
}

h2{
    margin:20px 0;
}

.logo{
    height:70px;
}

button{
    margin-top:25px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b5e20;
}
</style>
</head>

<body>

<div id="certificateContent" class="certificate">

<img src="Logo.png" class="logo"><br>

<h1>Certificate of Green Contribution 🌳</h1>

<p>This certificate is proudly presented to</p>

<h2 id="studentName"></h2>

<p>For successfully planting</p>

<h2 id="treeCount"></h2>

<p>and earning</p>

<h2 id="greenPoints"></h2>

<p>in the Smart Tree Plantation Initiative.</p>

<p>Issued by: Your College Name – CSE Department</p>

</div>

<button onclick="downloadPDF()">Download Certificate PDF</button>
<br>
<button onclick="goBack()">Back to Dashboard</button>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
    window.location="index.html";
}

let data = JSON.parse(localStorage.getItem("usersData")) || {};

document.getElementById("studentName").innerText = currentUser;
document.getElementById("treeCount").innerText = data[currentUser].trees + " Trees 🌳";
document.getElementById("greenPoints").innerText = data[currentUser].points + " Green Points 💚";

function downloadPDF(){
    let element = document.getElementById("certificateContent");
    html2pdf().from(element).save(currentUser + "_Green_Certificate.pdf");
}

function goBack(){
    window.location="dashboard.html";
}

</script>

</body>
</html>
