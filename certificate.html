<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate | Smart Tree Plantation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#134e5e,#71b280);
padding:20px;
}

.certificate{
background:white;
width:900px;
max-width:100%;
padding:50px 40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
position:relative;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

.border{
position:absolute;
top:15px;
left:15px;
right:15px;
bottom:15px;
border:5px solid #22c55e;
border-radius:15px;
pointer-events:none;
}

h1{
font-size:32px;
color:#134e5e;
margin-bottom:10px;
}

h2{
font-size:20px;
color:#555;
margin-bottom:30px;
}

.name{
font-size:28px;
font-weight:700;
color:#16a34a;
margin:20px 0;
}

.details{
font-size:18px;
margin:10px 0;
color:#333;
}

.footer{
margin-top:40px;
display:flex;
justify-content:space-between;
font-size:14px;
color:#444;
}

button{
margin-top:30px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}

.back{
background:#0ea5e9;
margin-left:10px;
}

.back:hover{
background:#0284c7;
}
</style>
</head>

<body>

<div class="certificate" id="certificateArea">

<div class="border"></div>

<h1>Certificate of Appreciation</h1>
<h2>Smart Tree Plantation Initiative</h2>

<p>This certificate is proudly presented to</p>

<div class="name" id="certName"></div>

<div class="details">
For actively participating in the Green Technology Initiative<br>
at <strong>Andhra Loyola College – CSE Department</strong>
</div>

<div class="details">
Trees Planted: <strong id="certTrees"></strong><br>
Green Points Earned: <strong id="certPoints"></strong>
</div>

<div class="footer">
<div>Date: <span id="certDate"></span></div>
<div>Authorized Signature</div>
</div>

<button onclick="downloadPDF()">Download PDF</button>
<button class="back" onclick="goDashboard()">Back</button>

</div>

<script>

// Get current user
let user = localStorage.getItem("currentUser");
if(!user){
window.location.href="index.html";
}

// Get plants data
let plants = JSON.parse(localStorage.getItem("plants")) || [];

// Filter user plants
let userPlants = plants.filter(p => p.user === user);

let totalTrees = userPlants.length;
let totalPoints = totalTrees * 10;

document.getElementById("certName").innerText = user;
document.getElementById("certTrees").innerText = totalTrees;
document.getElementById("certPoints").innerText = totalPoints;
document.getElementById("certDate").innerText = new Date().toLocaleDateString();

function downloadPDF(){
window.print();
}

function goDashboard(){
window.location.href="dashboard.html";
}

</script>

</body>
</html>
