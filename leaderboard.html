<!DOCTYPE html>
<html>
<head>
<title>Smart Tree Plantation - Leaderboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family: Arial; text-align:center; background:#0f2027; color:white;
}
h1{ margin-top:20px; }
table{
  margin:auto; border-collapse: collapse; width:90%; max-width:600px;
}
th, td{
  border:1px solid #00c853; padding:10px;
}
th{
  background:#00c853; color:black;
}
tr:nth-child(even){ background: rgba(0,200,83,0.2); }
</style>
</head>
<body>

<h1>🏆 Leaderboard</h1>
<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Tree Name</th>
      <th>Points</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="leaderboardBody">
    <!-- Filled by JS -->
  </tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadLeaderboard(){
  db.collection("plants").orderBy("points", "desc").get().then(snapshot=>{
    const tbody = document.getElementById("leaderboardBody");
    tbody.innerHTML = "";
    let i=1;
    snapshot.forEach(doc=>{
      const data = doc.data();
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${i}</td>
                      <td>${data.tree}</td>
                      <td>${data.points}</td>
                      <td>${data.date}</td>`;
      tbody.appendChild(tr);
      i++;
    });
  });
}

loadLeaderboard();
</script>

</body>
</html>
