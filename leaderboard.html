<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Smart Tree Plantation</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#134e5e,#71b280);
    text-align:center;
    color:white;
}

/* Header */
header{
    background:#0f2027;
    padding:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
}

header img{
    height:50px;
}

/* Card */
.card{
    background:white;
    color:black;
    width:400px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ccc;
}

th{
    background:#2e7d32;
    color:white;
}

tr:hover{
    background:#f1f1f1;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1b5e20;
}
</style>
</head>

<body>

<header>
    <img src="Logo.png">
    <h2>ANDHRA LOYOLA COLLEGE – CSE Department</h2>
</header>

<div class="card">

<h2>🏆 Green Leaderboard</h2>

<table id="leaderboardTable">
<tr>
<th>Rank</th>
<th>Name</th>
<th>Points</th>
</tr>
</table>

<button onclick="goBack()">Back to Dashboard</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("usersData")) || {};

let table = document.getElementById("leaderboardTable");

// Convert object to array
let users = Object.keys(data).map(name => {
    return { name: name, points: data[name].points };
});

// Sort by points descending
users.sort((a,b)=> b.points - a.points);

// Add rows
users.forEach((user,index)=>{
    let medal="";
    if(index===0) medal="🥇";
    else if(index===1) medal="🥈";
    else if(index===2) medal="🥉";
    else medal=index+1;

    let row = table.insertRow();
    row.insertCell(0).innerText = medal;
    row.insertCell(1).innerText = user.name;
    row.insertCell(2).innerText = user.points;
});

function goBack(){
    window.location="dashboard.html";
}

</script>

</body>
</html>
