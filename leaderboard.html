<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard | Smart Tree Plantation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(-45deg,#134e5e,#71b280,#0f2027,#2c5364);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
color:white;
text-align:center;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
padding:30px 15px;
}

h1{
margin-bottom:10px;
}

.subtitle{
opacity:0.8;
margin-bottom:25px;
}

/* Glass Table */
.table-container{
max-width:600px;
margin:0 auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.4);
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
}

th{
border-bottom:2px solid rgba(255,255,255,0.3);
}

tr{
transition:0.3s;
}

tr:hover{
background:rgba(255,255,255,0.1);
}

.rank{
font-weight:700;
font-size:18px;
}

.gold{color:#ffd700;}
.silver{color:#c0c0c0;}
.bronze{color:#cd7f32;}

button{
margin-top:25px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Leaderboard</h1>
<div class="subtitle">Andhra Loyola College – CSE Department</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Trees</th>
<th>Points</th>
</tr>
</thead>
<tbody id="leaderboardBody">
</tbody>
</table>
</div>

<button onclick="goDashboard()">⬅ Back to Dashboard</button>

</div>

<script>

let plants = JSON.parse(localStorage.getItem("plants")) || [];

let userStats = {};

// Calculate trees per user
plants.forEach(p=>{
if(!userStats[p.user]){
userStats[p.user]=0;
}
userStats[p.user]+=1;
});

// Convert to array
let leaderboard = [];

for(let user in userStats){
leaderboard.push({
name:user,
trees:userStats[user],
points:userStats[user]*10
});
}

// Sort by points descending
leaderboard.sort((a,b)=>b.points-a.points);

let tbody=document.getElementById("leaderboardBody");

leaderboard.forEach((user,index)=>{

let rankClass="";
if(index===0) rankClass="gold";
else if(index===1) rankClass="silver";
else if(index===2) rankClass="bronze";

tbody.innerHTML+=`
<tr>
<td class="rank ${rankClass}">${index+1}</td>
<td>${user.name}</td>
<td>${user.trees}</td>
<td>${user.points}</td>
</tr>
`;

});

function goDashboard(){
window.location.href="dashboard.html";
}

</script>

</body>
</html>
