<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Tree Plantation - Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family:'Poppins', Arial, sans-serif;
      text-align:center;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
    }

    h1{
      margin-top:20px;
      font-size:32px;
      animation: fadeIn 2s;
    }

    table{
      width:90%;
      max-width:700px;
      margin:20px auto;
      border-collapse: collapse;
      backdrop-filter: blur(10px);
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,255,0,0.4);
    }

    th, td{
      padding:12px 15px;
      border-bottom:1px solid rgba(0,255,0,0.3);
      text-align:center;
    }

    th{
      background:#00c853;
      color:black;
    }

    tr:nth-child(even){
      background: rgba(0,255,83,0.1);
    }

    tr:hover{
      background: rgba(0,255,83,0.3);
      transform: scale(1.01);
      transition:0.3s;
    }

    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  </style>
</head>
<body>

<h1>🏆 Smart Tree Plantation Leaderboard</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>User Name</th>
      <th>Tree Name</th>
      <th>Points</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="leaderboardBody">
    <!-- Data filled by JS -->
  </tbody>
</table>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Load Leaderboard
function loadLeaderboard(){
  db.collection("plants")
    .orderBy("points", "desc")
    .get()
    .then(snapshot=>{
      const tbody = document.getElementById("leaderboardBody");
      tbody.innerHTML = "";
      let i=1;
      snapshot.forEach(doc=>{
        const data = doc.data();
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${i}</td>
                        <td>${data.user}</td>
                        <td>${data.tree}</td>
                        <td>${data.points}</td>
                        <td>${data.date}</td>`;
        tbody.appendChild(tr);
        i++;
      });
    })
    .catch(err=>{console.error("Error loading leaderboard:", err);});
}

loadLeaderboard();
</script>

</body>
</html>
