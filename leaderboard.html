<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - Smart Tree Plantation</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#134e5e,#71b280);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
}

.table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
}

.table th,
.table td{
    padding:12px;
    text-align:center;
}

.table th{
    background:rgba(0,0,0,0.3);
}

.table tr:nth-child(even){
    background:rgba(255,255,255,0.05);
}

.rank1{
    background:gold !important;
    color:black;
    font-weight:bold;
}

.rank2{
    background:silver !important;
    color:black;
    font-weight:bold;
}

.rank3{
    background:#cd7f32 !important;
    color:black;
    font-weight:bold;
}

.back-btn{
    display:block;
    text-align:center;
    margin-top:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}
</style>
</head>

<body>

<header>
🏆 Global Leaderboard 🌍
</header>

<div class="container">

<table class="table">
<thead>
<tr>
<th>Rank</th>
<th>User</th>
<th>Total Trees 🌳</th>
<th>Green Points 💚</th>
</tr>
</thead>

<tbody id="leaderboardBody">
</tbody>
</table>

<div class="back-btn">
<button onclick="window.location='dashboard.html'">
Back to Dashboard
</button>
</div>

</div>

<script>

// Get all users data
let usersData = JSON.parse(localStorage.getItem("usersData")) || {};

// Convert object to array
let usersArray = [];

for(let user in usersData){
    usersArray.push({
        name:user,
        trees:usersData[user].trees,
        points:usersData[user].points
    });
}

// Sort by highest points
usersArray.sort((a,b) => b.points - a.points);

let tableBody = document.getElementById("leaderboardBody");

if(usersArray.length === 0){
    tableBody.innerHTML =
    `<tr><td colspan="4">No participants yet 🌱</td></tr>`;
}
else{

    usersArray.forEach((user,index)=>{

        let rowClass = "";

        if(index===0) rowClass="rank1";
        else if(index===1) rowClass="rank2";
        else if(index===2) rowClass="rank3";

        tableBody.innerHTML += `
        <tr class="${rowClass}">
            <td>${index+1}</td>
            <td>${user.name}</td>
            <td>${user.trees}</td>
            <td>${user.points}</td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
