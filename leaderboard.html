<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard - Smart Tree Plantation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(to right,#11998e,#38ef7d);
      text-align:center;
    }
    header{
      background:#0b6623;
      color:white;
      padding:15px;
      font-size:20px;
    }
    table{
      margin:30px auto;
      border-collapse:collapse;
      width:80%;
      background:white;
    }
    th, td{
      padding:10px;
      border:1px solid #ddd;
    }
    th{
      background:#0b6623;
      color:white;
    }
    button{
      padding:8px 15px;
      background:#0b6623;
      color:white;
      border:none;
      cursor:pointer;
      margin:15px;
    }
  </style>
</head>
<body>

<header>🌳 Leaderboard</header>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Name</th>
      <th>Trees Planted</th>
      <th>Green Points</th>
    </tr>
  </thead>
  <tbody id="leaderboardBody">
  </tbody>
</table>

<button onclick="goBack()">Back to Dashboard</button>

<script>
  let data = JSON.parse(localStorage.getItem("usersData")) || {};
  let users = Object.keys(data);

  users.sort((a,b) => data[b].points - data[a].points);

  let body = document.getElementById("leaderboardBody");

  users.forEach((user,index)=>{
    body.innerHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${user}</td>
        <td>${data[user].trees}</td>
        <td>${data[user].points}</td>
      </tr>
    `;
  });

  function goBack(){
    window.location="dashboard.html";
  }
</script>

</body>
</html>
