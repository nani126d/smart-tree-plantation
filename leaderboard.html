<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard | ALC Green Registry</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root {
      --primary-green: #2ecc71;
      --accent-gold: #f1c40f;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1511497584788-8767fe771d85?auto=format&fit=crop&q=80&w=2560');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 1.2s ease-out;
    }

    header h1 {
      font-weight: 700;
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    header p { color: #ccc; letter-spacing: 1px; }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      background: var(--glass-bg);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(5px);
      transition: 0.3s;
    }

    .back-btn:hover { background: var(--primary-green); color: #000; border-color: transparent; }

    .leaderboard-container {
      width: 100%;
      max-width: 900px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      animation: slideUp 0.8s ease-out;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th {
      text-align: left;
      padding: 20px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary-green);
      border-bottom: 1px solid var(--glass-border);
    }

    td {
      padding: 20px;
      font-size: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(46,204,113,0.1); color: var(--primary-green); }

    .rank {
      font-weight: 700;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .rank-1 { background: var(--accent-gold); color: #000; box-shadow: 0 0 15px var(--accent-gold); }
    .rank-2 { background: #bdc3c7; color: #000; }
    .rank-3 { background: #cd7f32; color: #000; }

    .points-badge {
      background: rgba(46,204,113,0.2);
      padding: 5px 12px;
      border-radius: 8px;
      color: var(--primary-green);
      font-weight: 600;
    }

    .date-text { font-size: 0.8rem; color: #aaa; }

    @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    @keyframes slideUp { from {transform:translateY(50px);opacity:0;} to {transform:translateY(0);opacity:1;} }

    @media (max-width:600px){
      .back-btn { position: static; margin-bottom: 20px; display: inline-block; }
      header h1 { font-size: 1.5rem; }
      td, th { padding: 10px; font-size: 0.8rem; }
      .leaderboard-container { padding: 15px; }
    }
  </style>
</head>
<body>

<a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>

<header>
  <h1><i class="fas fa-medal" style="color: var(--accent-gold)"></i> Green Champions</h1>
  <p>Honoring top environmental contributors</p>
</header>

<div class="leaderboard-container">
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Contributor</th>
        <th>Tree Species</th>
        <th>Credits</th>
        <th>Registered</th>
      </tr>
    </thead>
    <tbody id="leaderboardBody">
      <tr>
        <td colspan="5" style="text-align:center; padding:50px;">
          <i class="fas fa-sync fa-spin"></i> Loading leaderboard...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDJMDruut0JSaXPNQFtJunzMV9n0pDe9Tc",
  authDomain: "smart-tree-plantation-alc.firebaseapp.com",
  projectId: "smart-tree-plantation-alc",
  storageBucket: "smart-tree-plantation-alc.firebasestorage.app",
  messagingSenderId: "1079228357775",
  appId: "1:1079228357775:web:825a35b9903b8fae86e4fa"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadLeaderboard(){
  db.collection("plants")
    .orderBy("points","desc")
    .limit(50)
    .onSnapshot(snapshot => {
      const tbody = document.getElementById("leaderboardBody");
      tbody.innerHTML = "";

      if(snapshot.empty){
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No data found. Be the first to plant!</td></tr>';
        return;
      }

      let rank = 1;
      snapshot.forEach(doc => {
        const data = doc.data();
        const timestamp = data.timestamp ? data.timestamp.toDate().toLocaleString() : 'Recently added';
        const tr = document.createElement("tr");

        let rankClass = "";
        if(rank === 1) rankClass = "rank-1";
        else if(rank === 2) rankClass = "rank-2";
        else if(rank === 3) rankClass = "rank-3";

        tr.innerHTML = `
          <td><div class="rank ${rankClass}">${rank}</div></td>
          <td><i class="fas fa-user-circle"></i> <b>${data.user || 'Anonymous'}</b></td>
          <td><i class="fas fa-tree" style="color:var(--primary-green)"></i> ${data.tree || '-'}</td>
          <td><span class="points-badge">${data.points || 0} pts</span></td>
          <td class="date-text">${timestamp}</td>
        `;
        tbody.appendChild(tr);
        rank++;
      });
    }, error=>{
      console.error("Error fetching leaderboard:", error);
      document.getElementById("leaderboardBody").innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error loading data</td></tr>`;
    });
}

loadLeaderboard();
</script>

</body>
</html>
