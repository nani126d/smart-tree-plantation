<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALC | Smart Tree Plantation Initiative</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
:root {
  --primary-green: #2ecc71;
  --secondary-green: #27ae60;
  --dark-overlay: rgba(10, 25, 15, 0.7);
  --glass: rgba(255, 255, 255, 0.1);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#0b1a13;color:white;overflow-x:hidden;}

/* Navbar */
nav{position:fixed;top:0;width:100%;padding:25px 8%;display:flex;justify-content:space-between;align-items:center;z-index:1000;transition:0.5s;}
nav.scrolled{background: rgba(11,26,19,0.95);padding:15px 8%;box-shadow:0 4px 30px rgba(0,0,0,0.3);}
.logo{font-weight:800;font-size:1.5rem;letter-spacing:2px;color:white;text-decoration:none;display:flex;align-items:center;gap:10px;}
.logo i{color:var(--primary-green);}
.nav-links{display:flex;gap:30px;list-style:none;}
.nav-links a{text-decoration:none;color:white;font-weight:500;font-size:0.9rem;transition:0.3s;text-transform:uppercase;letter-spacing:1px;}
.nav-links a:hover{color:var(--primary-green);}

/* Hero Section */
.hero{height:100vh;width:100%;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;background:linear-gradient(var(--dark-overlay), var(--dark-overlay)), url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=2560'); background-size:cover; background-position:center;}
.hero-content{max-width:900px;padding:20px;z-index:2;}
.hero-content h1{font-size:clamp(2.5rem, 8vw, 5rem);font-weight:800;line-height:1.1;margin-bottom:20px;text-transform:uppercase;}
.hero-content p{font-size:1.2rem;font-weight:300;margin-bottom:40px;color:#ccc;letter-spacing:1px;}
.cta-button{padding:18px 45px;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;background:var(--primary-green);color:white;border:none;border-radius:50px;cursor:pointer;transition:0.4s;text-decoration:none;display:inline-block;box-shadow:0 10px 30px rgba(46,204,113,0.4);}
.cta-button:hover{background:var(--secondary-green);transform:translateY(-5px);box-shadow:0 15px 40px rgba(46,204,113,0.6);}

/* Scroll Indicator */
.scroll-down{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);animation:bounce 2s infinite;cursor:pointer;}
@keyframes bounce{0%,20%,50%,80%,100%{transform:translateY(0) translateX(-50%);}40%{transform:translateY(-10px) translateX(-50%);}60%{transform:translateY(-5px) translateX(-50%);}}

/* Modal Styles */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:10000;}
.modal-content{background:#0b1a13;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center;position:relative;box-shadow:0 15px 40px rgba(0,0,0,0.7);}
.modal-content h2{margin-bottom:20px;}
.modal-content input{width:100%;padding:15px;margin:10px 0;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:white;outline:none;}
.modal-content button{padding:15px 30px;margin-top:15px;background:var(--primary-green);border:none;border-radius:50px;color:white;font-weight:700;cursor:pointer;transition:0.3s;}
.modal-content button:hover{background:var(--secondary-green);}
.close-btn{position:absolute;top:15px;right:15px;font-size:1.2rem;cursor:pointer;color:white;}

/* Responsive */
@media(max-width:768px){.nav-links{display:none;}}
</style>
</head>
<body>

<nav id="navbar">
  <a href="#" class="logo"><i class="fas fa-seedling"></i> ALC GREEN</a>
</nav>

<section class="hero">
  <div class="hero-content" data-aos="zoom-out" data-aos-duration="1500">
    <p>ESTABLISHED 2026 | ANDHRA LOYOLA COLLEGE</p>
    <h1>PLANT THE <span style="color: var(--primary-green);">FUTURE</span></h1>
    <p>Join our Smart Tree Plantation project and make a difference.</p>
    <button class="cta-button" onclick="openSignUp()">Sign Up</button>
  </div>
  <div class="scroll-down">
    <a href="#about"><i class="fas fa-chevron-down" style="color:white;font-size:2rem;"></i></a>
  </div>
</section>

<!-- Sign Up Modal -->
<div class="modal" id="signupModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeSignUp()">&times;</span>
    <h2>Create Your Account</h2>
    <input type="text" id="signupName" placeholder="Enter Your Name or User ID">
    <input type="password" id="signupPass" placeholder="Enter Password">
    <button onclick="registerUser()">Sign Up</button>
  </div>
</div>

<section class="stats-section" id="about">
  <div class="stat-card" data-aos="fade-up">
    <i class="fas fa-tree"></i>
    <h3>1,240+</h3>
    <p>Trees Registered</p>
  </div>
  <div class="stat-card" data-aos="fade-up" data-aos-delay="100">
    <i class="fas fa-users"></i>
    <h3>500+</h3>
    <p>Active Volunteers</p>
  </div>
  <div class="stat-card" data-aos="fade-up" data-aos-delay="200">
    <i class="fas fa-cloud-sun"></i>
    <h3>12.5t</h3>
    <p>CO2 Offset Est.</p>
  </div>
</section>

<footer>
  <p>© 2026 Andhra Loyola College | CSE Department Green Initiative</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({once:true,duration:1000});
window.addEventListener('scroll',()=>{const nav=document.getElementById('navbar');window.scrollY>50?nav.classList.add('scrolled'):nav.classList.remove('scrolled');});

// Modal functions
function openSignUp(){document.getElementById('signupModal').style.display='flex';}
function closeSignUp(){document.getElementById('signupModal').style.display='none';}

// Register User (store in localStorage for now)
function registerUser(){
  const name=document.getElementById('signupName').value.trim();
  const pass=document.getElementById('signupPass').value.trim();
  if(!name||!pass){alert('Please enter both Name and Password');return;}
  localStorage.setItem('currentUser',name);
  localStorage.setItem('currentPass',pass);
  alert(`Welcome ${name}! Your account is created.`);
  closeSignUp();
  window.location.href='dashboard.html'; // Redirect to dashboard page
}
</script>
</body>
</html>
