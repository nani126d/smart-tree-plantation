<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation | Andhra Loyola College</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#134e5e,#71b280,#0f2027,#2c5364);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow:hidden;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating circles */
.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 10s infinite ease-in-out;
}

.circle:nth-child(1){
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle:nth-child(2){
width:150px;
height:150px;
bottom:15%;
right:10%;
animation-duration:14s;
}

.circle:nth-child(3){
width:100px;
height:100px;
top:60%;
left:70%;
animation-duration:18s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* Main Card */
.container{
position:relative;
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
text-align:center;
width:350px;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:22px;
margin-bottom:5px;
}

h2{
font-size:18px;
margin-bottom:20px;
font-weight:300;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:25px;
background:#22c55e;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#16a34a;
transform:scale(1.05);
}

.toggle{
margin-top:15px;
font-size:14px;
cursor:pointer;
color:#bbf7d0;
}

.footer{
position:absolute;
bottom:15px;
font-size:12px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1>🌳 Smart Tree Plantation</h1>
<h2>Andhra Loyola College – CSE Department</h2>

<div id="formArea">
<input type="text" id="name" placeholder="Full Name">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
</div>

<div class="toggle" onclick="toggleForm()">Already registered? Sign In</div>

</div>

<div class="footer">
© 2026 Andhra Loyola College | Green Technology Initiative
</div>

<script>

let isLogin=false;

function toggleForm(){
let form=document.getElementById("formArea");
if(!isLogin){
form.innerHTML=`
<input type="text" id="name" placeholder="Full Name">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Sign In</button>
`;
document.querySelector(".toggle").innerText="New user? Register";
isLogin=true;
}else{
form.innerHTML=`
<input type="text" id="name" placeholder="Full Name">
<input type="password" id="password" placeholder="Password">
<button onclick="register()">Register</button>
`;
document.querySelector(".toggle").innerText="Already registered? Sign In";
isLogin=false;
}
}

function register(){
let name=document.getElementById("name").value;
let pass=document.getElementById("password").value;

if(name===""||pass===""){
alert("Please fill all fields");
return;
}

localStorage.setItem("user_"+name,pass);
localStorage.setItem("currentUser",name);

alert("Registration Successful!");
window.location.href="dashboard.html";
}

function login(){
let name=document.getElementById("name").value;
let pass=document.getElementById("password").value;

let savedPass=localStorage.getItem("user_"+name);

if(savedPass===pass){
localStorage.setItem("currentUser",name);
alert("Login Successful!");
window.location.href="dashboard.html";
}else{
alert("Invalid Credentials");
}
}

</script>

</body>
</html>
