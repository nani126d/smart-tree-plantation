<!DOCTYPE html>
<html>
<head>
  <title>Login - Smart Tree Plantation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(to right,#134e5e,#71b280);
      text-align:center;
      color:white;
    }
    .box {
      background:white;
      color:black;
      width:300px;
      margin:100px auto;
      padding:20px;
      border-radius:10px;
    }
    input {
      width:90%;
      padding:8px;
      margin:10px 0;
    }
    button {
      padding:8px 15px;
      background:#0b6623;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>🌳 Smart Tree Plantation System</h1>

<div class="box">
  <h3>Student Login</h3>
  <input type="text" id="username" placeholder="Enter your name">
  <br>
  <button onclick="login()">Login</button>
</div>

<script>
  function login(){
    let user=document.getElementById("username").value;
    if(user===""){
      alert("Enter your name!");
      return;
    }
    localStorage.setItem("currentUser",user);
    window.location="dashboard.html";
  }
</script>

</body>
</html>
