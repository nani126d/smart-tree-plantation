<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tree Plantation | Green Technologies</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(-45deg,#134e5e,#71b280,#0f2027,#2c5364);
    background-size:400% 400%;
    animation: gradientMove 12s ease infinite;
    color:white;
    overflow-x:hidden;
}

/* Animated Background */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Leaves */
.leaf{
    position:absolute;
    font-size:22px;
    animation: floatLeaf 10s linear infinite;
    opacity:0.7;
}

@keyframes floatLeaf{
    0%{transform:translateY(-10vh) rotate(0deg);}
    100%{transform:translateY(110vh) rotate(360deg);}
}

/* HEADER */
header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    padding:20px;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(12px);
}

header img{
    height:55px;
}

/* HERO */
.hero{
    text-align:center;
    padding:80px 20px 20px;
}

.hero h1{
    font-size:42px;
    color:#4ade80;
}

.typing{
    font-size:20px;
    margin-top:15px;
    height:25px;
}

/* LOGIN CARD */
.card{
    width:360px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation: fadeUp 1s ease;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
    transform:scale(1.05);
}

/* GLOBAL STATS */
.stats{
    margin-top:40px;
    text-align:center;
    font-size:20px;
}

.stats span{
    color:#4ade80;
    font-weight:bold;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    margin-top:60px;
    background:rgba(0,0,0,0.3);
    font-size:14px;
    opacity:0.8;
}

/* Animations */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- Floating Leaves -->
<div class="leaf" style="left:10%; animation-delay:0s;">🍃</div>
<div class="leaf" style="left:25%; animation-delay:3s;">🌿</div>
<div class="leaf" style="left:50%; animation-delay:6s;">🍃</div>
<div class="leaf" style="left:75%; animation-delay:2s;">🌿</div>
<div class="leaf" style="left:90%; animation-delay:5s;">🍃</div>

<header>
    <img src="Logo.png">
    <h2>ANDHRA LOYOLA COLLEGE – CSE Department</h2>
</header>

<div class="hero">
    <h1>🌳 Smart Tree Plantation</h1>
    <div class="typing" id="typingText"></div>
</div>

<div class="card">
    <input type="text" id="username" placeholder="Enter Your Name">
    <button onclick="login()">Start Plantation</button>
</div>

<div class="stats">
    🌍 Total Trees Planted: <span id="totalTrees">0</span><br><br>
    💚 Total Green Points: <span id="totalPoints">0</span>
</div>

<footer>
    © 2026 Smart Tree Plantation | Green Technologies Project
</footer>

<script>

/* Typing Animation */
const textArray = [
"Promoting Sustainable Development 🌍",
"Encouraging Green Technologies 🌱",
"Building a Cleaner Future 💚"
];

let typingIndex = 0;
let charIndex = 0;
let currentText = "";
let isDeleting = false;

function typeEffect(){
    let fullText = textArray[typingIndex];
    
    if(!isDeleting){
        currentText = fullText.substring(0,charIndex++);
        if(charIndex > fullText.length){
            isDeleting = true;
            setTimeout(typeEffect,1000);
            return;
        }
    }else{
        currentText = fullText.substring(0,charIndex--);
        if(charIndex < 0){
            isDeleting = false;
            typingIndex = (typingIndex+1) % textArray.length;
        }
    }

    document.getElementById("typingText").innerText = currentText;
    setTimeout(typeEffect,80);
}

typeEffect();

/* Login */
function login(){
    let name = document.getElementById("username").value.trim();

    if(name===""){
        alert("Please enter your name");
        return;
    }

    localStorage.setItem("currentUser", name);

    let data = JSON.parse(localStorage.getItem("usersData")) || {};

    if(!data[name]){
        data[name] = { trees:0, points:0 };
        localStorage.setItem("usersData", JSON.stringify(data));
    }

    window.location="dashboard.html";
}

/* Global Stats */
function updateGlobalStats(){
    let data = JSON.parse(localStorage.getItem("usersData")) || {};
    let totalTrees = 0;
    let totalPoints = 0;

    Object.values(data).forEach(user=>{
        totalTrees += user.trees;
        totalPoints += user.points;
    });

    document.getElementById("totalTrees").innerText = totalTrees;
    document.getElementById("totalPoints").innerText = totalPoints;
}

updateGlobalStats();

</script>

</body>
</html>
